<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PRO 拍摄执行系统 | 习习 V2.0</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <style type="text/tailwindcss">
    @layer utilities {
      .masonry { column-count: 2; column-gap: 12px; }
      @screen md { .masonry { column-count: 3; column-gap: 16px; } }
      .card { break-inside: avoid; margin-bottom: 12px; }
      .nav-dim { @apply flex-1 text-center text-[11px] font-bold py-3 text-gray-400 border-b-2 border-transparent transition-all uppercase tracking-tighter cursor-pointer; }
      .nav-dim.active { @apply text-black border-black; }
      .tag-pill { @apply px-3 py-1.5 rounded-full text-[11px] bg-gray-100 text-gray-600 border border-transparent transition-all; }
      .tag-pill.selected { @apply bg-black text-white shadow-md scale-105; }
      #subFilterPanel { transition: max-height 0.3s ease; max-height: 0; overflow: hidden; }
      #subFilterPanel.open { max-height: 250px; border-bottom: 1px solid #f3f4f6; }
      .grid-lines { @apply absolute inset-0 pointer-events-none opacity-0 transition-opacity z-10; }
      .grid-lines.show { @apply opacity-100; }
      .grid-v { @apply absolute h-full border-l border-white/30; top: 0; }
      .grid-h { @apply absolute w-full border-t border-white/30; left: 0; }
      .upload-progress { @apply absolute bottom-0 left-0 h-1 bg-[#FF2442] transition-all duration-300; }
    }
  </style>
</head>
<body class="bg-[#F9FAFB] min-h-screen pb-10">

<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100">
  <div class="px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-1.5">
      <div class="w-7 h-7 bg-black rounded flex items-center justify-center text-white text-[10px] font-black italic">PRO</div>
      <span class="font-black tracking-tighter text-sm uppercase text-black">Shooting Ref</span>
    </div>
    <button onclick="toggleGrid()" id="gridBtn" class="text-[10px] px-2.5 py-1 bg-gray-50 border border-gray-200 rounded-full font-bold text-gray-500 uppercase">Grid: Off</button>
  </div>
  <div class="flex" id="dimNav">
    <button onclick="switchDim('交互', this)" class="nav-dim">交互</button>
    <button onclick="switchDim('姿势', this)" class="nav-dim">姿势</button>
    <button onclick="switchDim('景别', this)" class="nav-dim">景别</button>
    <button onclick="switchDim('环境', this)" class="nav-dim">环境</button>
    <button onclick="switchDim('其他', this)" class="nav-dim">其他</button>
  </div>
  <div id="subFilterPanel"><div id="tagContainer" class="flex flex-wrap gap-2 px-4 py-3"></div></div>
</header>

<main class="p-3 max-w-screen-xl mx-auto">
  <label class="block mb-6 bg-white border-2 border-dashed border-gray-200 rounded-3xl py-12 text-center active:scale-95 transition-all cursor-pointer">
    <input type="file" id="upInput" accept="image/*" multiple class="hidden">
    <i class="fa fa-cloud-upload text-gray-300 text-3xl mb-2"></i>
    <p class="text-[10px] font-bold text-gray-400 tracking-widest uppercase">Tap to upload 3:4 photo</p>
  </label>
  <div id="gallery" class="masonry"></div>
</main>

<div id="detailModal" class="fixed inset-0 z-[100] hidden bg-black flex flex-col">
  <div class="absolute top-4 right-4 z-50">
    <button onclick="closeModal()" class="w-10 h-10 bg-white/10 backdrop-blur-md rounded-full text-white flex items-center justify-center"><i class="fa fa-times"></i></button>
  </div>
  <div class="flex-1 flex items-center justify-center relative p-4">
    <div class="relative aspect-[3/4] h-full max-h-[70vh]">
        <img id="modalImg" class="w-full h-full object-contain rounded-xl">
        <div id="modalGrid" class="grid-lines absolute inset-0">
            <div class="grid-v" style="left:33.3%"></div><div class="grid-v" style="left:66.6%"></div>
            <div class="grid-h" style="top:33.3%"></div><div class="grid-h" style="top:66.6%"></div>
        </div>
    </div>
  </div>
  <div class="bg-white rounded-t-[40px] p-8 shadow-2xl">
    <div class="flex justify-between items-center mb-6">
      <div id="modalTags" class="flex flex-wrap gap-2"></div>
      <span id="modalLens" class="text-[11px] font-black bg-gray-100 px-3 py-1 rounded-lg text-gray-500 tracking-tighter uppercase">--MM</span>
    </div>
    <p class="text-[10px] text-gray-300 font-black uppercase tracking-[0.2em] mb-3">Professional Shooting Instruction</p>
    <div id="modalQuote" class="text-xl font-bold text-black leading-tight italic">“获取指令中...”</div>
  </div>
</div>

<script>
const CONFIG = {
  S_URL: "https://vblbsudjygkdlkyzadmr.supabase.co", 
  S_KEY: "sb_publishable_tDg0y9w1HZFb_oV5Gb7VHg_Sh_g-1Cf",
  K_KEY: "sk-8or80CblH3SSruV1VyNpfpAJP59YTiFPIfu8toxbYDxWyN8K",
  BUCKET: "Gallery01" 
};

const _client = supabase.createClient(CONFIG.S_URL, CONFIG.S_KEY);
let _items = [];
let _selectedTags = new Set();
let _showGrid = false;

const DICTIONARY = { '交互': ['看镜头', '不看镜头', '背影', '侧颜', '遮脸'], '姿势': ['站立', '坐姿', '蹲姿', '走动', '靠坐'], '景别': ['全身', '半身', '特写', '局部'], '环境': ['晴天强光', '阴柔光', '夜景霓虹', '室内空间', '雨天氛围'], '其他': ['虚化', '细节', '道具', '对比', '情绪'] };

window.onload = async () => {
  const { data } = await _client.from('inspirations').select('*').order('created_at', { ascending: false });
  if (data) { _items = data; renderGallery(); }
};

document.getElementById('upInput').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  for (const file of files) {
    const tempId = 't-' + Math.random().toString(36).substr(2, 5);
    renderPlaceholder(tempId, URL.createObjectURL(file));
    const pBar = document.querySelector(`#${tempId} .upload-progress`);
    const statusTxt = document.querySelector(`#${tempId} .status-text`);

    try {
      const fileName = `${Date.now()}-${file.name.replace(/[^\x00-\x7F]/g, "")}`;
      // 1. 上传图片 (含进度条)
      const { data: uploadData, error: upError } = await _client.storage.from(CONFIG.BUCKET).upload(fileName, file, {
        onUploadProgress: (p) => { pBar.style.width = `${(p.loaded/p.total)*100}%`; }
      });
      if(upError) throw new Error("存储服务连接失败");

      const { data: { publicUrl } } = _client.storage.from(CONFIG.BUCKET).getPublicUrl(fileName);
      
      // 2. AI 识别
      statusTxt.innerText = "AI 语义解析中...";
      const b64 = await toB64(file);
      const aiData = await getAI(b64);

      // 3. 写入数据库
      const { data: db, error: dbError } = await _client.from('inspirations').insert([{ 
        image_url: publicUrl, storage_path: fileName,
        tags: aiData.tags, quote: aiData.quote, lens: aiData.lens 
      }]).select();
      if(dbError) throw new Error("数据保存失败");

      _items.unshift(db[0]);
      document.getElementById(tempId)?.remove();
      renderCard(db[0]);
    } catch (err) {
      statusTxt.innerText = `失败: ${err.message}`;
      statusTxt.classList.replace('text-gray-400', 'text-red-500');
      pBar.style.backgroundColor = '#ef4444';
    }
  }
});

async function getAI(base64) {
  try {
    const res = await fetch("https://api.bltcy.ai/v1/chat/completions", {
      method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${CONFIG.K_KEY}` },
      body: JSON.stringify({
        model: "kimi-k2.5",
        messages: [{ role: "user", content: [{ type: "text", text: "分析此3:4图,输出JSON: tags:{交互,姿势,景别,环境,其他}, quote:给模特的话术, lens:焦段数字" }, { type: "image_url", image_url: { url: base64 } }]}],
        response_format: { type: "json_object" }
      })
    });
    const j = await res.json();
    return JSON.parse(j.choices[0].message.content);
  } catch (e) { throw new Error("AI 接口响应异常"); }
}

function openDetail(id) {
  const item = _items.find(x => x.id == id);
  if(!item) return;
  document.getElementById('modalImg').src = item.image_url;
  document.getElementById('modalQuote').innerText = `“${item.quote}”`;
  document.getElementById('modalLens').innerText = `${item.lens}MM`;
  const cls = { '交互':'bg-rose-400', '姿势':'bg-violet-400', '景别':'bg-blue-400', '环境':'bg-amber-400', '其他':'bg-emerald-400' };
  document.getElementById('modalTags').innerHTML = Object.entries(item.tags).filter(([k,v]) => v).map(([k,v]) => `<span class="px-2.5 py-1 rounded-md text-[10px] text-white font-bold ${cls[k]}">${v}</span>`).join('');
  document.getElementById('detailModal').classList.remove('hidden');
  document.getElementById('modalGrid').classList.toggle('show', _showGrid);
  document.body.style.overflow = 'hidden';
}

function closeModal() { document.getElementById('detailModal').classList.add('hidden'); document.body.style.overflow = 'auto'; }

function renderCard(item) {
  const div = document.createElement('div');
  div.id = item.id; div.className = 'card cursor-pointer active:scale-95 transition-transform';
  div.onclick = () => openDetail(item.id);
  const cls = { '交互':'bg-rose-400', '姿势':'bg-violet-400', '景别':'bg-blue-400', '环境':'bg-amber-400', '其他':'bg-emerald-400' };
  let tagH = Object.entries(item.tags).filter(([k,v]) => v).map(([k,v]) => `<span class="px-1.5 py-0.5 rounded text-[9px] text-white font-bold mr-1 ${cls[k]}">${v}</span>`).join('');

  div.innerHTML = `
    <div class="bg-white rounded-2xl overflow-hidden border border-gray-100 relative shadow-sm">
      <div class="aspect-[3/4] relative">
        <img src="${item.image_url}" class="w-full h-full object-cover block">
        <div class="grid-lines ${ _showGrid ? 'show' : '' }"><div class="grid-v" style="left:33.3%"></div><div class="grid-v" style="left:66.6%"></div><div class="grid-h" style="top:33.3%"></div><div class="grid-h" style="top:66.6%"></div></div>
      </div>
      <div class="p-2.5 flex flex-wrap gap-y-1">${tagH}</div>
    </div>
  `;
  document.getElementById('gallery').prepend(div);
}

function renderPlaceholder(id, url) {
  const div = document.createElement('div');
  div.id = id; div.className = 'card';
  div.innerHTML = `
    <div class="bg-white rounded-2xl overflow-hidden border border-gray-100 aspect-[3/4] relative bg-gray-50">
      <img src="${url}" class="w-full h-full object-cover opacity-20">
      <div class="absolute inset-0 flex flex-col items-center justify-center p-4">
        <span class="status-text text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2">Uploading...</span>
        <div class="w-full h-1 bg-gray-100 rounded-full overflow-hidden relative">
          <div class="upload-progress w-0"></div>
        </div>
      </div>
    </div>`;
  document.getElementById('gallery').prepend(div);
}

function toggleGrid() {
  _showGrid = !_showGrid;
  document.getElementById('gridBtn').innerText = _showGrid ? 'Grid: On' : 'Grid: Off';
  document.querySelectorAll('.grid-lines').forEach(el => el.classList.toggle('show', _showGrid));
}

function switchDim(dim, btn) {
  const panel = document.getElementById('subFilterPanel');
  const container = document.getElementById('tagContainer');
  if (document.querySelector('.nav-dim.active') === btn) { panel.classList.remove('open'); btn.classList.remove('active'); return; }
  document.querySelectorAll('.nav-dim').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
  container.innerHTML = DICTIONARY[dim].map(tag => `<button onclick="toggleTag('${tag}', this)" class="tag-pill ${_selectedTags.has(tag)?'selected':''}">${tag}</button>`).join('');
  panel.classList.add('open');
}

function toggleTag(tag, btn) {
  _selectedTags.has(tag) ? _selectedTags.delete(tag) : _selectedTags.add(tag);
  btn.classList.toggle('selected');
  applyFilters();
}

function applyFilters() {
  _items.forEach(item => {
    const el = document.getElementById(item.id);
    if (!el) return;
    const match = _selectedTags.size === 0 || Array.from(_selectedTags).every(t => Object.values(item.tags).includes(t));
    el.style.display = match ? 'block' : 'none';
  });
}

function renderGallery() { document.getElementById('gallery').innerHTML = ''; _items.forEach(i => renderCard(i)); }
function toB64(f) { return new Promise((r) => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); }); }
</script>
</body>
</html>
