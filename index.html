<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PRO 创作工作站</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,aspect-ratio"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            redx: '#FF2442',
            paper: '#F9FAFB'
          },
          boxShadow: {
            card: '0 10px 30px rgba(15, 23, 42, 0.06)'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .waterfall {
        column-count: 2;
        column-gap: 12px;
      }
      .waterfall-card {
        break-inside: avoid;
        margin-bottom: 12px;
      }
      .nav-tab {
        @apply flex-1 py-3 text-center text-[11px] font-black uppercase tracking-tight text-gray-400 border-b-2 border-transparent transition-all;
      }
      .nav-tab.active {
        @apply text-black border-black;
      }
      .tag-chip {
        @apply rounded-full border border-gray-200 bg-white px-3 py-1.5 text-[11px] font-bold text-gray-500 transition-all;
      }
      .tag-chip.active {
        @apply border-black bg-black text-white;
      }
      .dim-panel {
        max-height: 0;
        overflow: hidden;
        transition: max-height .35s ease;
      }
      .dim-panel.open {
        max-height: 220px;
      }
      .grid-overlay {
        @apply pointer-events-none absolute inset-0 opacity-0 transition-opacity;
      }
      .grid-overlay.show {
        @apply opacity-100;
      }
      .grid-overlay .v {
        @apply absolute top-0 h-full border-l border-white/40;
      }
      .grid-overlay .h {
        @apply absolute left-0 w-full border-t border-white/40;
      }
    }
  </style>
</head>
<body class="min-h-screen bg-paper text-black">
  <div class="mx-auto w-full max-w-md pb-8">
    <header class="sticky top-0 z-40 border-b border-gray-200/80 bg-paper/90 backdrop-blur-xl">
      <div class="flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-2">
          <div class="flex h-7 w-7 items-center justify-center rounded-md bg-black text-[9px] font-black uppercase text-white">PRO</div>
          <div>
            <div class="text-sm font-black uppercase leading-none tracking-tight">Creation Station</div>
            <div class="mt-1 text-[10px] font-semibold uppercase tracking-[0.18em] text-gray-400">3:4 reference workflow</div>
          </div>
        </div>
        <button id="gridToggle" class="rounded-full border border-gray-200 bg-white px-3 py-1.5 text-[10px] font-black uppercase tracking-wide text-gray-500">Grid: Off</button>
      </div>
      <div id="dimNav" class="flex px-1">
        <button class="nav-tab" data-dim="交互">交互</button>
        <button class="nav-tab" data-dim="姿势">姿势</button>
        <button class="nav-tab" data-dim="景别">景别</button>
        <button class="nav-tab" data-dim="环境">环境</button>
        <button class="nav-tab" data-dim="其他">其他</button>
      </div>
      <div id="subFilterPanel" class="dim-panel border-b border-transparent">
        <div id="tagContainer" class="flex flex-wrap gap-2 px-4 pb-4 pt-3"></div>
      </div>
    </header>

    <main class="px-3 pt-3">
      <section class="mb-4 rounded-[28px] bg-white p-3 shadow-card">
        <input type="file" id="upInput" accept="image/*,image/heic,image/heif" multiple class="hidden">
        <button id="uploadBtn" type="button" class="mx-auto flex aspect-[3/4] w-[52vw] max-w-[220px] items-center justify-center rounded-[28px] border-2 border-dashed border-gray-200 bg-paper transition active:scale-[0.98]">
          <div class="space-y-2 text-center">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-[#FFF1F3] text-redx">
              <i class="fa fa-plus text-lg"></i>
            </div>
            <div class="text-sm font-black uppercase tracking-tight">Tap to upload</div>
            <div class="text-[11px] font-medium text-gray-400">3:4 inspirations only</div>
          </div>
        </button>
      </section>

      <section id="gallery" class="waterfall"></section>

      <section id="emptyState" class="px-4 py-16 text-center text-gray-300">
        <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-white shadow-card">
          <i class="fa fa-clone text-2xl"></i>
        </div>
        <p class="text-sm font-bold">暂无参考图</p>
        <p class="mt-1 text-xs">上传后会自动压缩、识别并缓存</p>
      </section>
    </main>
  </div>

  <div id="detailModal" class="fixed inset-0 z-50 hidden bg-black/95">
    <div class="mx-auto flex h-full w-full max-w-md flex-col">
      <div class="flex items-center justify-between px-4 py-4">
        <div class="rounded-full bg-white/10 px-3 py-1 text-[10px] font-black uppercase tracking-[0.18em] text-white">Immersive View</div>
        <button id="closeModalBtn" class="flex h-10 w-10 items-center justify-center rounded-full bg-white/10 text-white">
          <i class="fa fa-times"></i>
        </button>
      </div>
      <div class="flex flex-1 items-center justify-center px-4">
        <div class="relative aspect-[3/4] w-full overflow-hidden rounded-[28px] bg-white/5">
          <img id="modalImg" class="h-full w-full object-cover">
          <div id="modalGrid" class="grid-overlay">
            <div class="v" style="left:33.3333%"></div>
            <div class="v" style="left:66.6666%"></div>
            <div class="h" style="top:33.3333%"></div>
            <div class="h" style="top:66.6666%"></div>
          </div>
          <div class="absolute right-3 top-3 rounded-full bg-black/55 px-3 py-1 text-[11px] font-black uppercase tracking-wide text-white">

        <div id="modalQuote" class="text-2xl font-black italic leading-tight tracking-tight text-black">“等待内容...”</div>
        <div id="modalTags" class="mt-5 flex flex-wrap gap-2"></div>

  </div>

  <script>
    const CONFIG = {
      S_URL: "https://vblbsudjygkdlkyzadmr.supabase.co",
      S_KEY: "sb_publishable_tDg0y9w1HZFb_oV5Gb7VHg_Sh_g-1Cf",
      K_KEY: "sk-8or80CblH3SSruV1VyNpfpAJP59YTiFPIfu8toxbYDxWyN8K",
      BUCKET: "Gallery01",
      K_URL: "https://api.bltcy.ai/v1/chat/completions",
      K_MODEL: "kimi-k2.5"
    };

    const CACHE_KEY = 'pro_creation_station_cache_v1';
    const DIMS = ['交互', '姿势', '景别', '环境', '其他'];
    const DICTIONARY = {
      '交互': ['看镜头', '不看镜头', '背影', '侧颜', '回头', '互动感'],
      '姿势': ['站立', '坐姿', '蹲姿', '走动', '伸展', '手部动作'],
      '景别': ['全身', '半身', '中近景', '特写', '局部'],
      '环境': ['室内空间', '纯色背景', '街头', '窗边光', '夜景', '自然场景'],
      '其他': ['情绪感', '道具', '留白', '虚化', '层次', '故事感']
    };
    const TAG_STYLE = {
      '交互': 'bg-black text-white',
      '姿势': 'bg-[#111827] text-white',
      '景别': 'bg-[#374151] text-white',
      '环境': 'bg-[#6B7280] text-white',
      '其他': 'bg-[#9CA3AF] text-white'
    };

    const client = supabase.createClient(CONFIG.S_URL, CONFIG.S_KEY);
    let items = [];
    let selectedDim = '';
    let selectedTags = new Set();
    let showGrid = false;

    const gallery = document.getElementById('gallery');
    const emptyState = document.getElementById('emptyState');
    const upInput = document.getElementById('upInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const gridToggle = document.getElementById('gridToggle');
    const tagContainer = document.getElementById('tagContainer');
    const subFilterPanel = document.getElementById('subFilterPanel');

    uploadBtn.addEventListener('click', openPicker);
    upInput.addEventListener('change', onUploadChange);
    gridToggle.addEventListener('click', toggleGrid);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('detailModal').addEventListener('click', (e) => {
      if (e.target.id === 'detailModal') closeModal();
    });
    document.querySelectorAll('#dimNav .nav-tab').forEach(btn => {
      btn.addEventListener('click', () => switchDim(btn.dataset.dim, btn));
    });

    init();

    async function init() {
      renderFromCache();
      await syncRemote();
    }

    function openPicker() {
      if (typeof upInput.showPicker === 'function') {
        upInput.showPicker();
        return;
      }
      upInput.click();
    }

    async function onUploadChange(e) {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      for (const file of files) {
        await uploadSingle(file);
      }
      upInput.value = '';
    }

    async function uploadSingle(file) {
      const tempId = 'tmp_' + Date.now() + Math.random().toString(36).slice(2, 7);
      const previewUrl = URL.createObjectURL(file);
      renderPlaceholder({ id: tempId, previewUrl, status: 'Uploading...' });

      try {
        const compressedBase64 = await compressToBase64(file, 800, 0.82);
        updatePlaceholder(tempId, { status: '上传至云端中...' });

        const fileName = `${Date.now()}-${sanitizeFileName(file.name || 'image.jpg')}.jpg`;
        const uploadBlob = dataUrlToBlob(compressedBase64);
        const uploadResult = await uploadToSupabase(fileName, uploadBlob, (progress) => {
          updatePlaceholder(tempId, { progress });
        });

        if (uploadResult.error) {
          throw new Error('Storage Error');
        }

        const publicUrl = client.storage.from(CONFIG.BUCKET).getPublicUrl(fileName).data.publicUrl;
        updatePlaceholder(tempId, { status: 'AI 语义解析中...' });

        const aiData = await requestAI(compressedBase64);
        const normalized = normalizeAI(aiData);
        const payload = {
          image_url: publicUrl,
          storage_path: fileName,
          tags: normalized.tags,
          quote: normalized.quote,
          lens: normalized.lens
        };

        const data = await insertInspirationRecord(payload);

        const item = normalizeItem(data, previewUrl);
        items.unshift(item);
        persistCache();
        document.getElementById(tempId)?.remove();
        renderGallery();
      } catch (error) {
        console.error('上传链路失败:', error);
        updatePlaceholder(tempId, {
          status: error.message === 'AI 返回数据损坏 (JSON Error)' ? 'JSON Error' : error.message,
          error: true
        });
      }
    }

    async function syncRemote() {
      try {
        const { data, error } = await client
          .from('inspirations')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;
        items = (data || []).map(row => normalizeItem(row));
        persistCache();
        renderGallery();
      } catch (error) {
        console.error('远程同步失败:', error);
      }
    }

    function renderFromCache() {
      try {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || '[]');
        if (!Array.isArray(cached)) return;
        items = cached.map(row => normalizeItem(row));
        renderGallery();
      } catch (error) {
        console.error('缓存读取失败:', error);
      }
    }

    function persistCache() {
      localStorage.setItem(CACHE_KEY, JSON.stringify(items.slice(0, 120)));
    }

    function normalizeItem(row, fallbackPreview) {
      return {
        id: row.id,
        image_url: row.image_url || fallbackPreview || '',
        storage_path: row.storage_path || '',
        tags: normalizeTags(parseTagsField(row.tags)),
        quote: typeof row.quote === 'string' && row.quote.trim() ? row.quote.trim() : '下巴微抬，眼神更松一点',
        lens: normalizeLens(row.lens),
        created_at: row.created_at || new Date().toISOString()
      };
    }

    async function insertInspirationRecord(payload) {
      const tagsAsObject = payload.tags;
      const tagsAsString = JSON.stringify(payload.tags);
      const attempts = [
        { ...payload, tags: tagsAsObject },
        { ...payload, tags: tagsAsString },
        { image_url: payload.image_url, tags: tagsAsObject, quote: payload.quote, lens: payload.lens },
        { image_url: payload.image_url, tags: tagsAsString, quote: payload.quote, lens: payload.lens },
        { image_url: payload.image_url, tags: tagsAsObject, quote: payload.quote },
        { image_url: payload.image_url, tags: tagsAsString, quote: payload.quote },
        { image_url: payload.image_url, tags: tagsAsObject },
        { image_url: payload.image_url, tags: tagsAsString },
        { image_url: payload.image_url }
      ];

      let lastError = null;
      for (const candidate of attempts) {
        const { data, error } = await client
          .from('inspirations')
          .insert([candidate])
          .select()
          .single();

        if (!error) return data;

        lastError = error;
        console.error('DB insert attempt failed:', { candidate, error });
      }

      const detailParts = [
        lastError?.code,
        lastError?.message,
        lastError?.details,
        lastError?.hint,
        lastError?.status ? `status ${lastError.status}` : ''
      ].filter(Boolean);

      throw new Error(detailParts[0] ? `DB: ${detailParts.join(' | ')}` : 'DB Error');
    }

    function parseTagsField(value) {
      if (!value) return {};
      if (typeof value === 'object') return value;
      if (typeof value === 'string') {
        try {
          return JSON.parse(value);
        } catch (error) {
          return {};
        }
      }
      return {};
    }

    function normalizeTags(tags) {
      const result = {};
      DIMS.forEach(dim => {
        const value = tags[dim];
        if (Array.isArray(value)) {
          result[dim] = value.map(v => String(v).trim()).filter(Boolean);
        } else if (typeof value === 'string' && value.trim()) {
          result[dim] = value
            .split(/[，,、/|]/)
            .map(v => v.trim())
            .filter(Boolean);
        }
        else result[dim] = [];
      });
      return result;
    }

    function normalizeLens(lens) {
      const numeric = parseInt(String(lens || '').replace(/[^\d]/g, ''), 10);
      return Number.isFinite(numeric) ? numeric : 50;
    }

    function renderGallery() {
      gallery.innerHTML = '';
      const filtered = getFilteredItems();
      emptyState.classList.toggle('hidden', filtered.length > 0);
      filtered.forEach(renderCard);
      syncGridUI();
    }

    function getFilteredItems() {
      if (!selectedTags.size) return items;
      return items.filter(item => {
        const flatTags = DIMS.flatMap(dim => item.tags[dim] || []);
        return Array.from(selectedTags).every(tag => flatTags.includes(tag));
      });
    }

    function renderCard(item) {
      const card = document.createElement('article');
      card.className = 'waterfall-card';
      card.id = `card_${item.id}`;
      card.innerHTML = `
        <button class="w-full overflow-hidden rounded-[24px] bg-white text-left shadow-card active:scale-[0.99] transition">
          <div class="relative aspect-[3/4] overflow-hidden">
            <img src="${escapeHtml(item.image_url)}" class="h-full w-full object-cover" loading="lazy">
            <div class="grid-overlay ${showGrid ? 'show' : ''}">
              <div class="v" style="left:33.3333%"></div>
              <div class="v" style="left:66.6666%"></div>
              <div class="h" style="top:33.3333%"></div>
              <div class="h" style="top:66.6666%"></div>
            </div>
          </div>
          <div class="space-y-2 p-3">
            <div class="line-clamp-2 text-[13px] font-black italic leading-snug text-black">“${escapeHtml(item.quote)}”</div>
            <div class="flex flex-wrap gap-1.5">${renderTagMarkup(item.tags, true)}</div>
          </div>
        </button>
      `;
      card.querySelector('button').addEventListener('click', () => openDetail(item.id));
      gallery.appendChild(card);
    }

    function renderPlaceholder({ id, previewUrl, status }) {
      const card = document.createElement('article');
      card.className = 'waterfall-card';
      card.id = id;
      card.innerHTML = `
        <div class="overflow-hidden rounded-[24px] bg-white shadow-card">
          <div class="relative aspect-[3/4] overflow-hidden bg-gray-100">
            <img src="${previewUrl}" class="h-full w-full object-cover opacity-35">
            <div class="absolute inset-x-0 top-0 h-1 bg-gray-100">
              <div class="progress-fill h-full w-0 bg-[#FF2442]"></div>
            </div>
            <div class="absolute inset-0 flex flex-col items-center justify-center bg-white/52 px-6 text-center backdrop-blur-[2px]">
              <div class="status-text text-[11px] font-black uppercase tracking-[0.18em] text-gray-500">${status}</div>
            </div>
          </div>
        </div>
      `;
      gallery.prepend(card);
      emptyState.classList.add('hidden');
    }

    function updatePlaceholder(id, { progress, status, error = false }) {
      const root = document.getElementById(id);
      if (!root) return;
      const progressEl = root.querySelector('.progress-fill');
      const statusEl = root.querySelector('.status-text');
      if (typeof progress === 'number' && progressEl) progressEl.style.width = `${progress}%`;
      if (status && statusEl) {
        statusEl.textContent = status;
        statusEl.className = `status-text text-[11px] font-black uppercase tracking-[0.18em] ${error ? 'text-redx' : 'text-gray-500'}`;
      }
    }

    async function uploadToSupabase(path, blob, onProgress) {
      if (onProgress) onProgress(8);
      const uploadPromise = client.storage.from(CONFIG.BUCKET).upload(path, blob, {
        contentType: 'image/jpeg',
        upsert: false
      });

      if (onProgress) {
        let progress = 8;
        const timer = setInterval(() => {
          progress = Math.min(progress + 12, 92);
          onProgress(progress);
        }, 160);
        const result = await uploadPromise;
        clearInterval(timer);
        onProgress(result.error ? progress : 100);
        return result;
      }

      return uploadPromise;
    }

    async function requestAI(base64) {
      const response = await fetch(CONFIG.K_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${CONFIG.K_KEY}`
        },
        body: JSON.stringify({
          model: CONFIG.K_MODEL,
          max_tokens: 400,
          response_format: { type: 'json_object' },
          messages: [{
            role: 'user',
            content: [
              {
                type: 'text',
                text: '你是摄影导演。分析这张 3:4 人像参考图，严格返回 JSON：{"tags":{"交互":[],"姿势":[],"景别":[],"环境":[],"其他":[]},"quote":"20字内模特引导话术","lens":"推荐焦段数字"}。只允许 JSON，不要解释，不要 markdown。'
              },
              {
                type: 'image_url',
                image_url: { url: base64 }
              }
            ]
          }]
        })
      });

      if (!response.ok) throw new Error(`Network Error ${response.status}`);
      const result = await response.json();
      try {
        return parseAIContent(result);
      } catch (error) {
        console.error('AI 原始返回解析失败:', result);
        throw new Error('AI 返回数据损坏 (JSON Error)');
      }
    }

    function parseAIContent(result) {
      const message = result?.choices?.[0]?.message;
      const content = message?.content;

      if (!content) {
        throw new Error('empty ai content');
      }

      if (typeof content === 'object' && !Array.isArray(content)) {
        return content;
      }

      if (Array.isArray(content)) {
        const textContent = content
          .map(part => typeof part === 'string' ? part : (part?.text || ''))
          .join('\n')
          .trim();
        return parseJSONStringLoose(textContent);
      }

      return parseJSONStringLoose(String(content));
    }

    function parseJSONStringLoose(text) {
      const cleaned = String(text)
        .replace(/```json\s*/gi, '')
        .replace(/```\s*/g, '')
        .trim();

      try {
        return JSON.parse(cleaned);
      } catch (error) {
        const extracted = extractJSONObject(cleaned);
        if (extracted) return JSON.parse(extracted);
        throw error;
      }
    }

    function extractJSONObject(text) {
      const start = text.indexOf('{');
      if (start === -1) return '';

      let depth = 0;
      let inString = false;
      let escaped = false;

      for (let i = start; i < text.length; i++) {
        const char = text[i];

        if (inString) {
          if (escaped) {
            escaped = false;
          } else if (char === '\\') {
            escaped = true;
          } else if (char === '"') {
            inString = false;
          }
          continue;
        }

        if (char === '"') {
          inString = true;
          continue;
        }

        if (char === '{') depth++;
        if (char === '}') depth--;

        if (depth === 0) {
          return text.slice(start, i + 1);
        }
      }

      return '';
    }

    function normalizeAI(aiData) {
      return {
        tags: normalizeTags(aiData.tags || {}),
        quote: truncateText(String(aiData.quote || '眼神放松，肩线自然打开').replace(/["“”]/g, ''), 20),
        lens: normalizeLens(aiData.lens)
      };
    }

    async function compressToBase64(file, maxWidth, quality) {
      const dataUrl = await readFileAsDataURL(file);
      const img = await loadImage(dataUrl);
      const width = Math.min(maxWidth, img.width || maxWidth);
      const scale = width / (img.width || width);
      const height = Math.max(1, Math.round((img.height || width) * scale));
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      return canvas.toDataURL('image/jpeg', quality);
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function dataUrlToBlob(dataUrl) {
      const [header, body] = dataUrl.split(',');
      const mime = (header.match(/data:(.*?);base64/) || [])[1] || 'image/jpeg';
      const bytes = atob(body);
      const array = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) array[i] = bytes.charCodeAt(i);
      return new Blob([array], { type: mime });
    }

    function switchDim(dim, btn) {
      const sameDim = selectedDim === dim && btn.classList.contains('active');
      document.querySelectorAll('#dimNav .nav-tab').forEach(el => el.classList.remove('active'));

      if (sameDim) {
        selectedDim = '';
        subFilterPanel.classList.remove('open');
        subFilterPanel.classList.add('border-transparent');
        tagContainer.innerHTML = '';
        return;
      }

      selectedDim = dim;
      btn.classList.add('active');
      renderSubTags(dim);
      subFilterPanel.classList.add('open');
      subFilterPanel.classList.remove('border-transparent');
    }

    function renderSubTags(dim) {
      tagContainer.innerHTML = DICTIONARY[dim]
        .map(tag => `<button class="tag-chip ${selectedTags.has(tag) ? 'active' : ''}" data-tag="${tag}">${tag}</button>`)
        .join('');

      tagContainer.querySelectorAll('[data-tag]').forEach(btn => {
        btn.addEventListener('click', () => toggleTag(btn.dataset.tag));
      });
    }

    function toggleTag(tag) {
      if (selectedTags.has(tag)) selectedTags.delete(tag);
      else selectedTags.add(tag);
      if (selectedDim) renderSubTags(selectedDim);
      renderGallery();
    }

    function toggleGrid() {
      showGrid = !showGrid;
      syncGridUI();
    }

    function syncGridUI() {
      gridToggle.textContent = showGrid ? 'Grid: On' : 'Grid: Off';
      document.querySelectorAll('.grid-overlay').forEach(el => el.classList.toggle('show', showGrid));
    }

    function openDetail(id) {
      const item = items.find(x => String(x.id) === String(id));
      if (!item) return;
      document.getElementById('modalImg').src = item.image_url;
      document.getElementById('modalQuote').textContent = `“${item.quote}”`;
      document.getElementById('modalLens').textContent = `${item.lens} MM`;
      document.getElementById('modalTags').innerHTML = renderTagMarkup(item.tags, false);
      document.getElementById('detailModal').classList.remove('hidden');
      document.getElementById('modalGrid').classList.toggle('show', showGrid);
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('detailModal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    function renderTagMarkup(tags, compact) {
      const baseClass = compact
        ? 'rounded-full px-2.5 py-1 text-[10px] font-black'
        : 'rounded-full px-3 py-1.5 text-[11px] font-black';

      return DIMS.flatMap(dim => (tags[dim] || []).map(tag => {
        const cls = TAG_STYLE[dim] || 'bg-black text-white';
        return `<span class="${baseClass} ${cls}">${escapeHtml(tag)}</span>`;
      })).join('');
    }

    function sanitizeFileName(name) {
      return name.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9-_]/g, '-').slice(0, 40) || 'image';
    }

    function truncateText(text, maxLength) {
      return text.length > maxLength ? text.slice(0, maxLength) : text;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
