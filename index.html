<!DOCTYPE html>

  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            redx: '#FF2442',
            paper: '#F9FAFB'
          },
          boxShadow: {
            card: '0 10px 30px rgba(15, 23, 42, 0.06)'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .waterfall {
        column-count: 2;
        column-gap: 12px;
      }
      .waterfall-card {
        break-inside: avoid;
        margin-bottom: 12px;
      }
      .nav-tab {
        @apply flex-1 py-3 text-center text-[11px] font-black uppercase tracking-tight text-gray-400 border-b-2 border-transparent transition-all;
      }
      .nav-tab.active {
        @apply text-black border-black;
      }
      .tag-chip {
        @apply rounded-full border border-gray-200 bg-gray-100 px-3 py-1.5 text-[11px] font-bold text-gray-900 transition-all;
      }
      .tag-chip.active {
        @apply border-black bg-black text-white;
      }
      .dim-panel {
        max-height: 0;
        overflow: hidden;
        transition: max-height .35s ease;
      }
      .dim-panel.open {
        max-height: 220px;
      }
      .grid-overlay {
        @apply pointer-events-none absolute inset-0 opacity-0 transition-opacity;
      }
      .grid-overlay.show {
        @apply opacity-100;
      }
      .grid-overlay .v {
        @apply absolute top-0 h-full border-l border-white/40;
      }
      .grid-overlay .h {
        @apply absolute left-0 w-full border-t border-white/40;
      }
    }
  </style>
</head>

    async function onUploadChange(e) {
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      for (const file of files) {
        await uploadSingle(file);
      }
      upInput.value = '';
    }

    async function uploadSingle(file) {
      const tempId = 'tmp_' + Date.now() + Math.random().toString(36).slice(2, 7);
      const previewUrl = URL.createObjectURL(file);
      renderQueueItem({ id: tempId, previewUrl, status: t('uploading') });
      let fileName = '';
      let publicUrl = '';

      try {
        const compressedBase64 = await compressToBase64(file, 800, 0.82);
        updateQueueItem(tempId, { status: t('uploadingCloud') });

        fileName = `${Date.now()}-${sanitizeFileName(file.name || 'image.jpg')}.jpg`;
        const uploadBlob = dataUrlToBlob(compressedBase64);
        const uploadResult = await uploadToSupabase(fileName, uploadBlob, (progress) => {
          updateQueueItem(tempId, { progress });
        });

        if (uploadResult.error) {
          throw new Error('Storage Error');
        }

        publicUrl = client.storage.from(CONFIG.BUCKET).getPublicUrl(fileName).data.publicUrl;
        updateQueueItem(tempId, { status: t('aiParsing') });

        const aiData = await requestAI(compressedBase64);
        const normalized = normalizeAI(aiData);
        const validationError = validateStrictSingleChoice(aiData);
        const payload = {
          image_url: publicUrl,
          storage_path: fileName,
          tags: normalized.tags,
          quote: normalized.quote,
          lens: normalized.lens,
          ai_model: currentModel,
          status: validationError ? 'failed' : 'success',
          error_log: validationError || ''
        };

        const data = await insertInspirationRecord(payload);
        const item = normalizeItem(data, previewUrl);
        if (item.status === 'success') {
          items.unshift(item);
          removeFailedAsset(tempId, fileName, publicUrl);
        } else {
          upsertFailedAsset(item);
        }
        persistCache();
        removeQueueItem(tempId);
        renderGallery();
        renderAdminLists();
      } catch (error) {
        console.error('上传链路失败:', error);
        const statusText = error.message === 'AI 返回数据损坏 (JSON Error)' ? 'JSON Error' : error.message;
        const failedAsset = normalizeFailureRecord({
          id: tempId,
          image_url: publicUrl || previewUrl,
          storage_path: fileName,
          tags: normalizeTags({}),
          quote: '',

    async function insertInspirationRecord(payload) {
      const tagsAsObject = payload.tags;
      const tagsAsString = JSON.stringify(payload.tags);
      const attempts = buildInsertAttempts(payload, tagsAsObject, tagsAsString);

      let lastError = null;
      for (const candidate of attempts) {
        const { data, error } = await client
          .from('inspirations')
          .insert([candidate])
          .select()
          .single();

        if (!error) return data;

        lastError = error;
        console.error('DB insert attempt failed:', { candidate, error });
      }

      const detailParts = [
        lastError?.code,
        lastError?.message,
        lastError?.details,
        lastError?.hint,
        lastError?.status ? `status ${lastError.status}` : ''
      ].filter(Boolean);

      throw new Error(detailParts[0] ? `DB: ${detailParts.join(' | ')}` : 'DB Error');
    }

        { image_url: payload.image_url, tags: tagsAsObject, quote: payload.quote, ai_model: payload.ai_model, status: payload.status, error_log: payload.error_log },
        { image_url: payload.image_url, tags: tagsAsString, quote: payload.quote, ai_model: payload.ai_model, status: payload.status, error_log: payload.error_log },

    function normalizeTags(tags) {
      const result = {};
      const input = tags || {};
      const hasNoPersonSignal = detectNoPerson(input);

      DIMS.forEach(dim => {
        const sourceValue = input[dim];
        const candidates = Array.isArray(sourceValue)
          ? sourceValue.map(v => String(v).trim()).filter(Boolean)
          : typeof sourceValue === 'string' && sourceValue.trim()
            ? sourceValue.split(/[，,、/|]/).map(v => v.trim()).filter(Boolean)
            : [];

        const allowed = DICTIONARY[dim];
        let picked = candidates.find(v => allowed.includes(v)) || '';

        if (hasNoPersonSignal && dim === '视角') picked = '非人视角';
        if (hasNoPersonSignal && dim === '姿势') picked = '静物/空间';
        if (!picked) picked = DEFAULT_TAGS[dim];

        result[dim] = [picked];
      });
      return result;

    async function requestAI(base64) {
      const response = await fetch(CONFIG.K_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${CONFIG.K_KEY}`
        },
        body: JSON.stringify({
          model: currentModel || CONFIG.K_MODEL,
          max_tokens: 400,
          response_format: { type: 'json_object' },
          messages: [{
            role: 'user',
            content: [
              {
                type: 'text',
                text: `分析这张3:4参考图。严格只返回JSON，不要解释，不要markdown，不要代码块。格式固定为：{"tags":{"视角":[],"姿势":[],"景别":[],"环境":[],"无人":[]},"quote":"20字内模特引导话术","lens":"固定焦段档位"}。标签必须只从以下数组中选一个：视角=${JSON.stringify(DICTIONARY['视角'])}；姿势=${JSON.stringify(DICTIONARY['姿势'])}；景别=${JSON.stringify(DICTIONARY['景别'])}；环境=${JSON.stringify(DICTIONARY['环境'])}；无人=${JSON.stringify(DICTIONARY['无人'])}。lens必须从${JSON.stringify(LENS_OPTIONS)}中选择一个。规则：1. 五个维度必须全部存在且每个数组只能有1个标签；2. 如果没有人物，视角必须返回“非人视角”，姿势必须返回“静物/空间”；3. 有人物时，无人维度返回“有人(忽略此项)”；4. quote少于20字。`
              },
              {
                type: 'image_url',
                image_url: { url: base64 }
              }
            ]
          }]
        })
      });

      if (!response.ok) throw new Error(`Network Error ${response.status}`);
      const result = await response.json();
      try {
        return parseAIContent(result);
      } catch (error) {
        console.error('AI 原始返回解析失败:', result);
        throw new Error('AI 返回数据损坏 (JSON Error)');
      }
    }

    function parseAIContent(result) {
      const message = result?.choices?.[0]?.message;
      const content = message?.content;

      if (!content) {
        throw new Error('empty ai content');
      }

      if (typeof content === 'object' && !Array.isArray(content)) {
        return content;
      }

      if (Array.isArray(content)) {
        const textContent = content
          .map(part => typeof part === 'string' ? part : (part?.text || ''))
          .join('\n')
          .trim();
        return parseJSONStringLoose(textContent);
      }

      return parseJSONStringLoose(String(content));
    }

    function parseJSONStringLoose(text) {
      const cleaned = String(text)
        .replace(/```json\s*/gi, '')
        .replace(/```\s*/g, '')
        .trim();

      try {
        return JSON.parse(cleaned);
      } catch (error) {
        const extracted = extractJSONObject(cleaned);
        if (extracted) return JSON.parse(extracted);
        throw error;
      }
    }

    function extractJSONObject(text) {
      const start = text.indexOf('{');
      if (start === -1) return '';

      let depth = 0;
      let inString = false;
      let escaped = false;

      for (let i = start; i < text.length; i++) {
        const char = text[i];

        if (inString) {
          if (escaped) {
            escaped = false;
          } else if (char === '\\') {
            escaped = true;
          } else if (char === '"') {
            inString = false;
          }
          continue;
        }

        if (char === '"') {
          inString = true;
          continue;
        }

        if (char === '{') depth++;
        if (char === '}') depth--;

        if (depth === 0) {
          return text.slice(start, i + 1);
        }
      }

      return '';
    }

    function validateStrictSingleChoice(aiData) {
      const rawTags = aiData && aiData.tags ? aiData.tags : {};
      for (const dim of DIMS) {

        const normalized = list.map(v => String(v).trim()).filter(Boolean);
        if (normalized.length !== 1) {

        if (!DICTIONARY[dim].includes(normalized[0])) {

      return '';
    }

    async function compressToBase64(file, maxWidth, quality) {
      const dataUrl = await readFileAsDataURL(file);
      const img = await loadImage(dataUrl);
      const width = Math.min(maxWidth, img.width || maxWidth);
      const scale = width / (img.width || width);
      const height = Math.max(1, Math.round((img.height || width) * scale));
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      return canvas.toDataURL('image/jpeg', quality);
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function dataUrlToBlob(dataUrl) {
      const [header, body] = dataUrl.split(',');
      const mime = (header.match(/data:(.*?);base64/) || [])[1] || 'image/jpeg';
      const bytes = atob(body);
      const array = new Uint8Array(bytes.length);
      for (let i = 0; i < bytes.length; i++) array[i] = bytes.charCodeAt(i);
      return new Blob([array], { type: mime });
    }

            <div class="mt-1 line-clamp-2 text-[11px] ${item.status === 'success' ? 'text-gray-400' : 'text-redx'}">${t('reasonPrefix')}: ${escapeHtml(reason)}</div>
            <div class="mt-3 flex gap-2">
              ${item.status !== 'success' && canRetry ? `<button data-action="retry" data-id="${escapeHtml(String(item.id))}" class="rounded-full border border-gray-200 bg-white px-3 py-1.5 text-[10px] font-black uppercase tracking-wide text-gray-500">${t('retry')}</button>` : ''}
              <button data-action="delete" data-id="${escapeHtml(String(item.id))}" class="rounded-full border border-gray-200 bg-white px-3 py-1.5 text-[10px] font-black uppercase tracking-wide text-gray-500">${t('delete')}</button>
            </div>
          </div>
        </div>
      `;
    }

    function bindAdminAction(btn, sourceList) {
      const item = sourceList.find(entry => String(entry.id) === btn.dataset.id);
      if (!item) return;
      if (btn.dataset.action === 'retry') {
        btn.addEventListener('click', () => retryFailedAsset(item));
      }
      if (btn.dataset.action === 'delete') {
        btn.addEventListener('click', () => deleteAsset(item));
      }
    }

    function bindSelectionAction(node, sourceList) {
      const id = node.dataset.selectId || node.dataset.cardId;
      if (!id) return;
      if (node.dataset.selectId) {
        node.addEventListener('change', () => {
          toggleSelected(id, node.checked);
        });
      } else {
        node.addEventListener('click', () => {
          const checkbox = node.parentElement.querySelector('[data-select-id]');
          const next = !selectedAssetIds.has(String(id));
          if (checkbox) checkbox.checked = next;
          toggleSelected(id, next);
        });
      }
    }

    function toggleSelected(id, checked) {
      const key = String(id);
      if (checked) selectedAssetIds.add(key);
      else selectedAssetIds.delete(key);
      syncBatchBar();
    }

    async function retryFailedAsset(item, skipConfirm = false) {
      if (!skipConfirm && !window.confirm(t('retryConfirm'))) return;
      if (!isRetryableAsset(item)) {
        window.alert(t('retryUnavailable'));
        return;
      }
      try {
        const base64 = await urlToDataURL(item.image_url);
        const aiData = await requestAI(base64);
        const normalized = normalizeAI(aiData);
        const updates = {
          tags: normalized.tags,
          quote: normalized.quote,
          lens: normalized.lens,
          status: 'success',
          error_log: ''
        };
        await updateRemoteRecord(item, updates);
        removeFailedAsset(item.id, item.storage_path, item.image_url);
        items.unshift(normalizeItem({ ...item, ...updates }));
        persistCache();
        renderGallery();
        renderAdminLists();
      } catch (error) {
        const message = error.message || 'Retry Error';
        item.error_log = message;
        upsertFailedAsset(item);
        await updateRemoteRecord(item, { status: 'failed', error_log: message });
        persistFailedAssets();
        renderAdminLists();
      }
    }

    async function deleteAsset(item, skipConfirm = false) {
      if (!skipConfirm && !window.confirm(t('deleteConfirm'))) return;
      if (item.storage_path) {
        try {
          await client.storage.from(CONFIG.BUCKET).remove([item.storage_path]);
        } catch (error) {
          console.error('Storage delete failed:', error);
        }
      }
      if (item.id && !String(item.id).startsWith('tmp_')) {
        try {
          await client.from('inspirations').delete().eq('id', item.id);
        } catch (error) {
          console.error('DB delete failed:', error);
        }
      }
      removeFailedAsset(item.id, item.storage_path, item.image_url);
      items = items.filter(entry => String(entry.id) !== String(item.id));
      persistCache();
      renderGallery();
      renderAdminLists();
    }

    async function batchDeleteSelected() {
      const ids = Array.from(selectedAssetIds);
      if (!ids.length) return;
      if (!window.confirm(t('deleteConfirm'))) return;
      const all = [...items, ...failedAssets];
      const selectedItems = ids
        .map(id => all.find(entry => String(entry.id) === String(id)))
        .filter(Boolean);

      const storagePaths = Array.from(new Set(selectedItems
        .map(item => item.storage_path)
        .filter(Boolean)));

      const dbIds = Array.from(new Set(selectedItems
        .map(item => item.id)
        .filter(id => id && !String(id).startsWith('tmp_'))));

      // 1) 优先批量删除 Storage 文件
      if (storagePaths.length) {
        try {
          await client.storage.from(CONFIG.BUCKET).remove(storagePaths);
        } catch (error) {
          console.error('Batch storage delete failed:', error);
        }
      }

      // 2) 再批量删除 DB 记录
      let dbDeletedCount = 0;
      let dbFailedCount = 0;
      if (dbIds.length) {
        try {
          const { error } = await client.from('inspirations').delete().in('id', dbIds);
          if (error) throw error;
          dbDeletedCount = dbIds.length;
        } catch (error) {
          console.error('Batch DB delete failed, fallback to single delete:', error);
          // 回退逐条删除，尽量保证可用性
          for (const dbId of dbIds) {
            try {
              const { error: singleError } = await client.from('inspirations').delete().eq('id', dbId);
              if (singleError) throw singleError;
              dbDeletedCount += 1;
            } catch (singleError) {
              console.error('Single DB delete failed:', dbId, singleError);
              dbFailedCount += 1;
            }
          }
        }
      }

      // 3) 本地状态同步移除
      const selectedIdSet = new Set(ids.map(String));
      const selectedPathSet = new Set(storagePaths);
      items = items.filter(item => !selectedIdSet.has(String(item.id)));
      failedAssets = failedAssets.filter(item =>
        !selectedIdSet.has(String(item.id)) &&
        !(item.storage_path && selectedPathSet.has(item.storage_path))
      );
      persistCache();
      persistFailedAssets();
      selectedAssetIds.clear();
      renderGallery();
      renderAdminLists();
      syncBatchBar();

      if (dbIds.length) {
        const failed = Math.max(dbIds.length - dbDeletedCount, dbFailedCount);
        const message = failed > 0
          ? `批量删除完成：数据库成功 ${dbDeletedCount}，失败 ${failed}`
          : `批量删除成功：数据库已删除 ${dbDeletedCount} 条`;
        showToast(message);
      } else {
        showToast('批量删除完成');
      }
    }

    async function batchRetrySelected() {
      const ids = Array.from(selectedAssetIds);
      if (!ids.length) return;
      if (!window.confirm(t('retryConfirm'))) return;
      const all = [...items, ...failedAssets];
      for (const id of ids) {
        const item = all.find(entry => String(entry.id) === String(id));
        if (item) await retryFailedAsset(item, true);
      }
      selectedAssetIds.clear();
      syncBatchBar();
    }

    async function updateRemoteRecord(item, updates) {
      if (!item.id || String(item.id).startsWith('tmp_')) {
        const payload = {
          image_url: item.image_url,
          storage_path: item.storage_path || '',
          tags: updates.tags || item.tags,
          quote: updates.quote || item.quote || '',
          lens: updates.lens || item.lens || '标准 50mm',
          status: updates.status || item.status || 'failed',
          error_log: updates.error_log || ''
        };
        try {
          return await insertInspirationRecord(payload);
        } catch (error) {
          console.error('Fallback insert on update failed:', error);
          return null;
        }
      }
      const attemptPayloads = buildUpdateAttempts(item, updates);
      let lastError = null;
      for (const candidate of attemptPayloads) {
        const { data, error } = await client.from('inspirations').update(candidate).eq('id', item.id).select().single();
        if (!error) return data;
        lastError = error;
      }
      if (lastError) throw new Error(lastError.message || 'Update Error');
      return null;
    }

    function buildUpdateAttempts(item, updates) {
      const mergedTags = updates.tags || item.tags;
      return [
        { tags: mergedTags, quote: updates.quote, lens: updates.lens, status: updates.status, error_log: updates.error_log, ai_model: currentModel },
        { tags: JSON.stringify(mergedTags), quote: updates.quote, lens: updates.lens, status: updates.status, error_log: updates.error_log, ai_model: currentModel },
        { tags: mergedTags, quote: updates.quote, status: updates.status, error_log: updates.error_log, ai_model: currentModel },
        { tags: JSON.stringify(mergedTags), quote: updates.quote, status: updates.status, error_log: updates.error_log, ai_model: currentModel },
        { status: updates.status, error_log: updates.error_log, ai_model: currentModel }
      ].map(payload => Object.fromEntries(Object.entries(payload).filter(([, value]) => value !== undefined)));
    }

    async function persistFailedRecordRemote(item) {
      const payload = {
        image_url: item.image_url,
        storage_path: item.storage_path || '',
        tags: item.tags,
        quote: '',
        lens: '标准 50mm',
        status: 'failed',
        error_log: item.error_log || 'Unknown Error'
      };
      try {
        const inserted = await insertInspirationRecord(payload);
        if (inserted) {
          removeFailedAsset(item.id, item.storage_path, item.image_url);
          upsertFailedAsset(normalizeFailureRecord({ ...inserted, source: 'remote' }));
        }
      } catch (error) {
        console.error('Persist failed record remotely skipped:', error);
      }
    }

    function upsertFailedAsset(asset) {
      const normalized = normalizeFailureRecord(asset);
      const index = failedAssets.findIndex(entry =>
        String(entry.id) === String(normalized.id) ||
        (entry.storage_path && normalized.storage_path && entry.storage_path === normalized.storage_path) ||
        (entry.image_url && normalized.image_url && entry.image_url === normalized.image_url)
      );
      if (index === -1) failedAssets.unshift(normalized);
      else failedAssets[index] = { ...failedAssets[index], ...normalized };
      persistFailedAssets();
    }

    function removeFailedAsset(id, storagePath, imageUrl) {
      failedAssets = failedAssets.filter(entry => {
        const sameId = id && String(entry.id) === String(id);
        const samePath = storagePath && entry.storage_path === storagePath;
        const sameUrl = imageUrl && entry.image_url === imageUrl;
        return !(sameId || samePath || sameUrl);
      });
      persistFailedAssets();
    }

    function mergeFailedAssets(remoteFailed, localFailed) {
      const merged = [];
      [...remoteFailed.map(item => normalizeFailureRecord({ ...item, source: 'remote' })), ...localFailed.map(normalizeFailureRecord)].forEach(item => {
        const exists = merged.find(entry =>
          String(entry.id) === String(item.id) ||
          (entry.storage_path && item.storage_path && entry.storage_path === item.storage_path) ||
          (entry.image_url && item.image_url && entry.image_url === item.image_url)
        );
        if (!exists) merged.push(item);
      });
      return merged;
    }

    function isRetryableAsset(item) {
      return Boolean(item.image_url) && /^https?:\/\//i.test(String(item.image_url));
    }

    async function urlToDataURL(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`Network Error ${response.status}`);
      const blob = await response.blob();
      return await readFileAsDataURL(blob);
    }

    function sortByDateDesc(a, b) {
      return new Date(b.created_at || 0).getTime() - new Date(a.created_at || 0).getTime();
    }

    function syncBatchBar() {
      const count = selectedAssetIds.size;
      batchBar.classList.toggle('hidden', !(currentPage === 'admin' && count > 0));
      batchCount.textContent = currentLang === 'zh'
        ? `${t('batchSelected')} ${count} ${t('batchSelectedSuffix')}`
        : `${count} ${t('batchSelected')}`;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.remove('hidden');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.add('hidden');
      }, 2200);
    }

    function getModelDisplayName(modelId) {
      if (String(modelId).includes('claude-haiku')) return 'Claude 4.5';
      if (String(modelId).includes('gpt-4o-mini')) return 'GPT-4o mini';
      if (String(modelId).includes('kimi')) return 'Kimi 2.5';
      if (String(modelId).includes('grok')) return 'Grok 4 Fast';
      return modelId || 'Unknown';
    }

    function syncDimIndicators() {
      document.querySelectorAll('#dimNav .nav-tab').forEach(btn => {
        const dim = btn.dataset.dim;
        const hasFilter = Boolean(activeFilters[dim]);
        const label = DIM_LABELS[currentLang][dim] || dim;
        btn.innerHTML = hasFilter ? `${label} <span class="inline-block ml-1 h-1.5 w-1.5 rounded-full bg-black align-middle"></span>` : label;
      });
    }

    function renderTagMarkup(tags, compact) {
      const baseClass = compact
        ? 'rounded-full px-2.5 py-1 text-[10px] font-black'
        : 'rounded-full px-3 py-1.5 text-[11px] font-black';

      return DIMS.flatMap(dim => (tags[dim] || []).map(tag => {
        if (String(tag) === '有人(忽略此项)') return '';
        const cls = TAG_STYLE[dim] || 'bg-black text-white';
        return `<span class="${baseClass} ${cls}">${escapeHtml(tag)}</span>`;
      })).join('');
    }

    function detectNoPerson(input) {
      const rawValues = Object.values(input).flatMap(value => {
        if (Array.isArray(value)) return value;
        if (typeof value === 'string') return [value];
        return [];
      }).map(v => String(v).trim());

      return rawValues.some(value =>
        ['非人视角', '静物/空间', '商品', '店面'].includes(value)
      );
    }

    function sanitizeFileName(name) {
      return name.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9-_]/g, '-').slice(0, 40) || 'image';
    }

    function truncateText(text, maxLength) {
      return text.length > maxLength ? text.slice(0, maxLength) : text;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
